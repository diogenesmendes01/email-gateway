# Map labels to file path globs. Applied automatically on PRs.
# Uses actions/labeler@v5 syntax
frontend:
  - changed-files:
    - any-glob-to-any-file:
      - 'frontend/**'
      - 'apps/web/**'
backend:
  - changed-files:
    - any-glob-to-any-file:
      - 'apps/api/**'
      - 'apps/worker/**'
infrastructure:
  - changed-files:
    - any-glob-to-any-file:
      - 'infra/**'
      - 'deploy/**'
      - 'docker/**'
      - 'Dockerfile'
      - '.github/**'
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - '*.md'
database:
  - changed-files:
    - any-glob-to-any-file:
      - 'packages/database/**'
shared:
  - changed-files:
    - any-glob-to-any-file:
      - 'packages/shared/**'
